name: Go Daemon CI Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60.3

      - name: Run errcheck
        run: |
          go install github.com/kisielk/errcheck@latest
          errcheck ./...

      - name: Verify compilation (Build check)
        run: go build -v -o /dev/null ./...

      - name: Run Automated Test Suite
        run: go test -v -race -cover ./...

      - name: Build Production Binaries (CLI & Agent)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p build
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o build/sentinel ./cmd/sentinel
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o build/sentinel-agent ./cmd/sentinel-agent
          tar -czvf sentinel-${{ github.ref_name }}-linux-amd64.tar.gz -C build sentinel sentinel-agent

      - name: Create Github Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: sentinel-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
