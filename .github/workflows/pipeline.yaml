name: Go Daemon CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
    test-and-validate:
      runs-on: ubuntu-latest

      steps:
        - name: Check out our repository code
          uses: actions/checkout@v4
        
        - name: Set up Go environment
          uses: actions/setup-go@v5
          with:
            go-version: '1.22'
        
        - name: Install dependencies
          run: go mod download

        - name: Verify compilation (Build Check)
          run: go build -v -o /dev/null ./...


